<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introduccion JavaScript</title>

    <!-- Inyectando JavaScript en el propio HTML -->
    <script>
        alert('Jugando con las Alertas')
    </script>
</head>
<body>

    <button onclick="alerta()">Click</button>
    <script>
        function alerta(){
            alert('Click de Alerta')
        }
    </script>


    <!-- Tratar de incluirlo al final de Body -->
    <script src="./JavaScript/appPrincipal.js"></script>
</body>
</html>
